		<script>
	(function () {
		function viewportSize() {
			if (window.visualViewport) {
				return { width: window.visualViewport.width, height: window.visualViewport.height };
			}
			return { width: window.innerWidth, height: window.innerHeight };
		}

		function fitCongratulationsPage() {
			var page = document.getElementById('page_0');
			if (!page) return;

			page.style.transform = 'none';
			var baseWidth = page.offsetWidth;
			var baseHeight = page.offsetHeight;
			if (!baseWidth || !baseHeight) return;

			var viewport = viewportSize();
			var scale = Math.min(viewport.width / baseWidth, viewport.height / baseHeight);
			if (!isFinite(scale) || scale <= 0) scale = 1;

			var left = (viewport.width - baseWidth * scale) / 2;
			var top = (viewport.height - baseHeight * scale) / 2;

			page.style.transform = 'scale(' + scale + ')';
			page.style.left = left + 'px';
			page.style.top = top + 'px';
		}

		window.addEventListener('load', fitCongratulationsPage);
		window.addEventListener('resize', fitCongratulationsPage);
		window.addEventListener('orientationchange', fitCongratulationsPage);
		if (window.visualViewport) {
			window.visualViewport.addEventListener('resize', fitCongratulationsPage);
			window.visualViewport.addEventListener('scroll', fitCongratulationsPage);
		}
	})();
	</script>
